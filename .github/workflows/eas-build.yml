name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app-cobrancas/package-lock.json
          
      - run: npm ci
        working-directory: app-cobrancas
        
      - name: Build with EAS
        run: npx eas build --platform android --profile preview --non-interactive --wait
        working-directory: app-cobrancas
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
